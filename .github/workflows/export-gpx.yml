name: Export GPX

on:
  workflow_dispatch:

jobs:
  export-gpx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GPX export
        run: python running_pagepr/gpx_sync.py
